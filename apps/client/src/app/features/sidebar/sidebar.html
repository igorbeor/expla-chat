<header class="sidebar__header">
  <h1 class="sidebar__title">Chats</h1>
  <app-search [value]="search()" (valueChange)="onSearch($event)" />
</header>

<div class="sidebar__list">
  @for (item of list(); track item.user.id + item.lastMessage?.sentAt) {
    <app-contact-item
      [name]="item.user.name"
      [avatarUrl]="item.user.avatarUrl"
      [status]="item.user.status"
      [lastMessage]="item.lastMessage"
      [selected]="item.user.id === selectedId()"
      [currentTime]="currentTime()"
      (selectContact)="onSelect(item.user.id)"
    />
  } @empty {
    <p class="sidebar__empty">No contacts found</p>
  }
</div>

<footer class="sidebar__footer">
  <app-filter-toggle [filter]="filter()" (filterChange)="onFilter($event)" />
</footer>
