<button
  type="button"
  class="contact-item"
  [class.contact-item--selected]="selected()"
  [attr.aria-current]="selected() ? 'true' : null"
  (click)="selectContact.emit()"
>
  <span class="contact-item__avatar">
    <app-avatar [avatarUrl]="avatarUrl()" [name]="name()" [size]="48" />
    @if (status() === UserStatuses.ONLINE) {
      <span class="contact-item__presence" aria-label="Online"></span>
    }
  </span>

  <span class="contact-item__body">
    <span class="contact-item__name">{{ name() }}</span>
    @if (lastMessage(); as last) {
      <span class="contact-item__preview">{{ last.content }}</span>
    }
  </span>

  @if (lastMessage(); as last) {
    <span class="contact-item__time">{{ last.sentAt | relativeTime: currentTime() }}</span>
  }
</button>
