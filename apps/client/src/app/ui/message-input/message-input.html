<textarea
  class="message-input__field"
  rows="1"
  placeholder="Type a message"
  aria-label="Type a message"
  [value]="text()"
  [disabled]="disabled()"
  (input)="onInput($event)"
  (keydown)="onKeydown($event)"
></textarea>

<button
  type="button"
  class="message-input__send"
  aria-label="Send message"
  [disabled]="!canSend()"
  (click)="submit()"
>
